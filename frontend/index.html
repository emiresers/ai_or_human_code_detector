<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI or Human Code Detector</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <div class="container">
        <h1>AI or Human Code Detector</h1>
        <p class="subtitle">Paste any code snippet below and let the models analyze it!</p>

        <textarea id="codeInput" placeholder="Paste your code here..."></textarea>

        <button id="analyzeBtn">Kodu Analiz Et</button>

        <div id="results" class="results hidden">
            <h2>Model Results</h2>

            <div class="model-box" id="lrBox">
                <h3>Logistic Regression</h3>
                <div class="progress-container">
                    <div class="progress-label">AI: <span id="lrAiPercent">0%</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill ai-progress" id="lrAiBar"></div>
                    </div>
                    <div class="progress-label">Human: <span id="lrHumanPercent">0%</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill human-progress" id="lrHumanBar"></div>
                    </div>
                </div>
            </div>

            <div class="model-box" id="nbBox">
                <h3>Naive Bayes</h3>
                <div class="progress-container">
                    <div class="progress-label">AI: <span id="nbAiPercent">0%</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill ai-progress" id="nbAiBar"></div>
                    </div>
                    <div class="progress-label">Human: <span id="nbHumanPercent">0%</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill human-progress" id="nbHumanBar"></div>
                    </div>
                </div>
            </div>

            <div class="model-box" id="rfBox">
                <h3>Random Forest</h3>
                <div class="progress-container">
                    <div class="progress-label">AI: <span id="rfAiPercent">0%</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill ai-progress" id="rfAiBar"></div>
                    </div>
                    <div class="progress-label">Human: <span id="rfHumanPercent">0%</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill human-progress" id="rfHumanBar"></div>
                    </div>
                </div>
            </div>

            <div class="final-box">
                <h3>Genel Özet (3 Model Ortalaması)</h3>
                <div class="progress-container">
                    <div class="progress-label">AI Ortalama: <span id="avgAiPercent">0%</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill ai-progress" id="avgAiBar"></div>
                    </div>
                    <div class="progress-label">Human Ortalama: <span id="avgHumanPercent">0%</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill human-progress" id="avgHumanBar"></div>
                    </div>
                </div>
                <h2 id="finalDecision"></h2>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
